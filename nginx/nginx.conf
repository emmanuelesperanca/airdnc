# Redireciona HTTP -> HTTPS
server {
    listen 80;
    server_name airdnc.straumann.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name airdnc.straumann.com;

    # ── Certificado SSL ──────────────────────────────────────────
    # Coloque os arquivos em nginx/certs/ (nao commitados no git)
    ssl_certificate     /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;

    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;

    # ── Headers de seguranca ─────────────────────────────────────
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    add_header X-Frame-Options            SAMEORIGIN                            always;
    add_header X-Content-Type-Options     nosniff                               always;
    add_header Referrer-Policy            "strict-origin-when-cross-origin"     always;

    root  /usr/share/nginx/html;
    index index.html;

    # ── Bloqueia arquivos sensiveis ──────────────────────────────
    location ~ /\. {
        deny all; return 404;
    }
    location ~* \.(py|env|sql|gitignore|example)$ {
        deny all; return 404;
    }
    location = /Dockerfile        { deny all; return 404; }
    location = /docker-compose.yml{ deny all; return 404; }
    location = /desks.py          { deny all; return 404; }

    # ── Proxy para a API FastAPI ─────────────────────────────────
    location /api/ {
        proxy_pass          http://api:5000;
        proxy_http_version  1.1;
        proxy_set_header    Host              $host;
        proxy_set_header    X-Real-IP         $remote_addr;
        proxy_set_header    X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header    X-Forwarded-Proto $scheme;
        proxy_read_timeout  30s;
        proxy_send_timeout  30s;
    }

    # ── Health check da API (opcional — para load balancer) ──────
    location = /health {
        proxy_pass http://api:5000/health;
        access_log off;
    }

    # ── Arquivos estaticos do frontend ───────────────────────────
    location ~* \.(css|js|html|ico|png|svg|woff2)$ {
        try_files $uri =404;
        add_header Cache-Control "public, max-age=3600";
        access_log off;
    }

    location / {
        try_files $uri /index.html;
        add_header Cache-Control "no-cache";
    }
}
